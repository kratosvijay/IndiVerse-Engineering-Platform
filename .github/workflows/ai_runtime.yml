name: AI Runtime CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: '3.12.2'

      - name: Install dependencies
        run: dart pub get

      - name: Format Check
        run: dart format --output=none --set-exit-if-changed lib test tool benchmark bin

      - name: Analyze Code
        run: dart analyze lib test tool benchmark bin

      - name: Run Unit Tests
        run: dart test
