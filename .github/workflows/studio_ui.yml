name: Studio UI CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get
        working-directory: studio_ui

      - name: Format Check
        run: dart format --output=none --set-exit-if-changed lib test
        working-directory: studio_ui

      - name: Analyze Code
        run: flutter analyze
        working-directory: studio_ui

      - name: Run Unit Tests
        run: flutter test
        working-directory: studio_ui
